<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-card">
        <h1 class="logo">PandaBook</h1>
        
        <form class="login-form">
            <div class="input-group">
                <label for="email">Почта</label>
                <input type="email" id="email" placeholder="example@gmail.ru">
            </div>
            
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="123456">
            </div>
            
            <div class="form-footer">
                <span class="no-account">Нет аккаунта?</span>
                <a href="reg.html" class="register-link">Регистрация</a>
            </div>
            
            <button type="submit" class="submit-btn">Войти</button>
        </form>
    </div>

</body>
</html>
