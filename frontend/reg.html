<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="reg.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="reg-card">
        <h1 class="logo">PandaBook</h1>
        
        <form class="reg-form">
            <div class="back">
                <a href="index.html"></a>
            </div>
            <div class="input-group">
                <label for="username">Имя</label>
                <input type="text" id="username" placeholder="Ваше имя">
            </div>

            <div class="input-group">
                <label for="email">Почта</label>
                <input type="email" id="email" placeholder="example@gmail.ru">
            </div>
            
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="123456">
            </div>
            <div class="form-footer">
                <span class="account">Уже есть аккаунт?</span>
                <a href="index.html" class="enter-link">Войти</a>
            </div>
            <button type="submit" class="submit-btn">Регистрация</button>
            

        </form>
    </div>

</body>
</html>
