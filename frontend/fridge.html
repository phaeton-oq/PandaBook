<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandaBook - Мой холодильник</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="fridge.css">
    <link rel="stylesheet" href="ui.css">
</head>
<body>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

    <nav class="sidebar-menu" id="sidebarMenu">
        <div class="sidebar-header">
            <span class="sidebar-logo">PandaBook</span>
            <button class="close-menu-btn" onclick="toggleMenu()">✕</button>
        </div>
        <ul class="menu-links">
            <li><a href="profile.html" class="menu-item">Профиль</a></li>
            <li><a href="dashboard.html" class="menu-item">Главный экран</a></li>
            <li><a href="fridge.html" class="menu-item active">Мой холодильник</a></li>
            <li><a href="shopping.html" class="menu-item">Мои покупки</a></li>
            <li><a href="landing.html#pricing" class="menu-item">Купить подписку</a></li>
        </ul>
    </nav>

    <div class="main-card">
        <header class="header-section">
            <div class="logo-area">
                <a href="#" id="backBtn" class="back-btn" hidden>← Назад</a>
                <button class="hamburger-btn" onclick="toggleMenu()">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 12H21M3 6H21M3 18H21" stroke="#4c7753" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1 class="logo">PandaBook</h1>
            </div>
            <h2 class="page-title">Мой холодильник</h2>
        </header>
        <div class="search-add-section">
            <div class="search-panel">
                <h3 class="section-title"> Поиск в глобальной базе</h3>
                <div style="position: relative; width: 100%;">
                    <input type="text" id="offSearchInput" class="form-control" placeholder="Введите название продукта" oninput="handleSearchInput(this.value)">
                    <div class="search-results-dropdown" id="searchResults"></div>
                </div>
                <div class="barcode-row">
                    <input type="text" id="barcodeInput" class="form-control" placeholder="Штрихкод (EAN)" inputmode="numeric" maxlength="20">
                    <button type="button" class="btn" onclick="lookupBarcode()">Найти</button>
                </div>
            </div>

            <div class="add-panel">
                <h3 class="section-title" id="formTitle">Добавить продукт вручную</h3>
                <input type="hidden" id="editIndex" value="-1">
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="text" id="prodName" class="form-control" placeholder="Название продукта">
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="prodWeight" class="form-control" placeholder="Количество (г)">
                        <input type="date" id="prodExpiry" class="form-control">
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <button type="button" class="btn" style="flex: 1;" onclick="saveProduct()">Сохранить</button>
                        <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display: none;" onclick="resetForm()">Отмена</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="fridge-content">
            <h3 class="section-title" style="margin-bottom: 20px;"> Продукты в наличии</h3>
            <div class="product-table-wrapper">
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Название продукта</th>
                            <th>Количество</th>
                            <th>Срок годности</th>
                            <th style="text-align: right;">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script>
        let selectedProduct = null;   // {product_id?|name|off_barcode} chosen from search
        let searchHits = [];
        let editId = -1;              // fridge item id being edited, or -1
        let searchTimer = null;

        function toggleMenu() {
            document.getElementById('sidebarMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('open');
        }

        const EDIT_SVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5d605e" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';
        const DEL_SVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e07a5f" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';

        function fmtDate(iso) {
            if (!iso) return "—";
            const p = iso.split('-');
            return p.length === 3 ? `${p[2]}.${p[1]}.${p[0]}` : iso;
        }
        function daysUntil(iso) {
            if (!iso) return Infinity;
            return Math.ceil((new Date(iso) - new Date()) / 86400000);
        }

        async function loadFridge() {
            const tbody = document.getElementById('productTableBody');
            try {
                const r = await api("GET", "/api/fridge");
                tbody.innerHTML = '';
                r.items.forEach(({ id, item }) => {
                    const soon = daysUntil(item.expiry_date) <= 3;
                    const badge = soon ? '<span class="badge-warning"> Скоро истекает</span>' : '';
                    const tr = document.createElement('tr');
                    tr.className = 'product-row';
                    tr.innerHTML = `
                        <td>${item.product.name}${badge}</td>
                        <td>${item.quantity_g} г</td>
                        <td>${fmtDate(item.expiry_date)}</td>
                        <td class="actions-cell">
                            <button class="action-btn" onclick="editItem(${id}, ${item.quantity_g}, '${item.expiry_date || ''}', '${item.product.name.replace(/'/g, "")}')">${EDIT_SVG}</button>
                            <button class="action-btn" onclick="deleteItem(${id})">${DEL_SVG}</button>
                        </td>`;
                    tbody.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }

        function handleSearchInput(value) {
            const dropdown = document.getElementById('searchResults');
            clearTimeout(searchTimer);
            if (value.trim().length < 2) { dropdown.classList.remove('active'); return; }
            searchTimer = setTimeout(async () => {
                try {
                    const [cat, off] = await Promise.all([
                        api("GET", "/api/products?q=" + encodeURIComponent(value)),
                        api("GET", "/api/products/search?q=" + encodeURIComponent(value) + "&limit=8"),
                    ]);
                    searchHits = dedupeProducts([...cat, ...off]).slice(0, 12);
                    dropdown.innerHTML = searchHits.length
                        ? searchHits.map((p, i) =>
                            `<div class="search-result-item" onclick="pickHit(${i})">${p.name} · ${Math.round(p.kcal_100)} ккал</div>`).join('')
                        : '<div class="search-result-item muted">Ничего не найдено</div>';
                    dropdown.classList.add('active');
                } catch (e) { console.error(e); }
            }, 300);
        }

        function pickHit(i) {
            const p = searchHits[i];
            selectedProduct = { product_id: p.id ?? undefined, name: p.name, off_barcode: p.off_barcode ?? undefined };
            fillProductForm(p);
            document.getElementById('searchResults').classList.remove('active');
            document.getElementById('offSearchInput').value = '';
            document.getElementById('prodWeight').focus();
        }

        async function lookupBarcode() {
            const code = document.getElementById("barcodeInput").value.trim();
            if (!/^\d{8,14}$/.test(code)) return toast("Введите штрихкод 8–14 цифр", "error");
            try {
                const p = await api("GET", "/api/products/barcode/" + encodeURIComponent(code));
                selectedProduct = { name: p.name, off_barcode: p.off_barcode || code };
                fillProductForm(p);
                document.getElementById("barcodeInput").value = "";
                document.getElementById("prodWeight").focus();
                toast("Найден: " + p.name, "success");
            } catch (e) {
                toast("Продукт не найден в Open Food Facts", "error");
            }
        }

        async function saveProduct() {
            const name = document.getElementById('prodName').value.trim();
            const weight = parseInt(document.getElementById('prodWeight').value);
            const expiry = document.getElementById('prodExpiry').value || null;
            if (!name || !weight) { toast('Укажите продукт и количество', 'error'); return; }
            try {
                if (editId > 0) {
                    await api("PATCH", "/api/fridge/" + editId, { quantity_g: weight, expiry_date: expiry });
                } else {
                    const body = { quantity_g: weight, expiry_date: expiry };
                    if (selectedProduct && selectedProduct.name === name) {
                        if (selectedProduct.product_id) body.product_id = selectedProduct.product_id;
                        else if (selectedProduct.off_barcode) body.off_barcode = selectedProduct.off_barcode;
                        else body.name = name;
                    } else { body.name = name; }
                    await api("POST", "/api/fridge", body);
                }
                resetForm();
                loadFridge();
                toast(editId > 0 ? "Продукт обновлён" : "Добавлено в холодильник", "success");
            } catch (e) { toast("Не удалось сохранить: " + apiError(e), "error"); }
        }

        function editItem(id, weight, expiry, name) {
            editId = id;
            selectedProduct = null;
            document.getElementById('prodName').value = name;
            document.getElementById('prodWeight').value = weight;
            document.getElementById('prodExpiry').value = expiry;
            document.getElementById('formTitle').innerText = "Редактировать продукт";
            document.getElementById('cancelEditBtn').style.display = "inline-block";
        }

        async function deleteItem(id) {
            if (!confirm('Удалить этот продукт?')) return;
            try { await api("DELETE", "/api/fridge/" + id); loadFridge(); toast("Удалено", "success"); }
            catch (e) { toast("Ошибка: " + apiError(e), "error"); }
        }

        function resetForm() {
            editId = -1; selectedProduct = null;
            document.getElementById('prodName').value = '';
            document.getElementById('prodWeight').value = '';
            document.getElementById('prodExpiry').value = '';
            document.getElementById('formTitle').innerText = "Добавить продукт вручную";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        if (requireAuth()) loadFridge();
        document.getElementById("barcodeInput")?.addEventListener("keydown", (e) => {
            if (e.key === "Enter") { e.preventDefault(); lookupBarcode(); }
        });
    </script>
</body>
</html>
